<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Task Manager</h1>

    <form action="/add" method="post" class="d-flex justify-content-center mb-4">
        <input type="text" name="title" class="form-control w-50 me-2" placeholder="Enter task" required>
        <button class="btn btn-primary">Add</button>
    </form>

    <ul class="list-group w-50 mx-auto">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <span>
                {{ task[1] }}
                {% if task[2] == 'Done' %}
                    <span class="badge bg-success">Done</span>
                {% else %}
                    <span class="badge bg-warning text-dark">Pending</span>
                {% endif %}
            </span>

            <div>
                <a href="/complete/{{ task[0] }}" class="btn btn-sm btn-success">✔</a>
                <a href="/delete/{{ task[0] }}" class="btn btn-sm btn-danger">❌</a>
            </div>
        </li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
